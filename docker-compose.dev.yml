name: ai-scale-system-dev

services:
  db:
    image: pgvector/pgvector:0.8.3-pg16
    container_name: ai-scale-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: ai-scale-hermes-dev
    restart: unless-stopped
    command: gateway run
    environment:
      API_SERVER_ENABLED: 'true'
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${HERMES_API_SERVER_KEY}
      API_SERVER_MODEL_NAME: ${HERMES_API_SERVER_MODEL:-hermes-agent}
    ports:
      - '127.0.0.1:8642:8642'
    volumes:
      - hermes_dev_data:/opt/data

volumes:
  postgres_dev_data:
    name: ai-scale-postgres-data-dev
  hermes_dev_data:
    name: ai-scale-hermes-data-dev
